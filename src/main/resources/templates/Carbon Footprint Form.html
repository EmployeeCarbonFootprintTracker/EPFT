<!DOCTYPE html>
<html lang="en">
<head>
    <title>Carbon Footprint Form</title>
</head>
<body>
<h1>Daily Carbon Footprint Form</h1>
<form th:action="@{/employee/carbon-footprint/create}" method="post">
    <!-- Transportation Section -->
    <h2>Transportation</h2>
    <label for="activityType">How did you commute today?</label>
    <select id="activityType" name="activityType">
        <option value="Car">Car (solo)</option>
        <option value="Carpool">Carpool</option>
        <option value="Public Transit">Public Transit</option>
        <option value="Bike">Bike</option>
        <option value="Walk">Walk</option>
        <option value="Electric Vehicle">Electric Vehicle</option>
        <option value="Work from Home">Work from Home</option>
    </select><br><br>

    <label for="distance">How far did you travel (miles)?</label>
    <input type="number" id="distance" name="distance" min="0" step="0.1"><br><br>

    <label for="carType">Car Type (if applicable):</label>
    <select id="carType" name="carType">
        <option value="">-- Select --</option>
        <option value="Gasoline">Gasoline</option>
        <option value="Diesel">Diesel</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Electric">Electric</option>
    </select><br><br>

    <!-- Home Energy Section -->
    <h2>Home Energy</h2>
    <label for="thermostatAdjustment">Did you adjust your thermostat today?</label>
    <select id="thermostatAdjustment" name="thermostatAdjustment">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
    </select><br><br>

    <label for="degreeChange">If yes, by how many degrees?</label>
    <input type="number" id="degreeChange" name="degreeChange" min="1" max="5"><br><br>

    <!-- Showers Section -->
    <h2>Showers</h2>
    <label for="showerDuration">How long was your shower today (minutes)?</label>
    <input type="number" id="showerDuration" name="showerDuration" min="0" step="1"><br><br>

    <!-- Food Choices Section -->
    <h2>Food Choices</h2>
    <label for="plantBasedMeals">Did you eat a plant-based meal today?</label>
    <select id="plantBasedMeals" name="plantBasedMeals">
        <option value="Yes">Yes</option>
        <option value="No">No</option>
        <option value="Partially">Partially</option>
    </select><br><br>

    <label for="mealCount">If yes, how many meals?</label>
    <input type="number" id="mealCount" name="mealCount" min="1" max="3"><br><br>

    <!-- Waste Management Section -->
    <h2>Waste Management</h2>
    <label for="wasteType">Did you recycle or compost today?</label>
    <select id="wasteType" name="wasteType">
        <option value="Recycle">Recycle</option>
        <option value="Compost">Compost</option>
        <option value="Both">Both</option>
        <option value="Neither">Neither</option>
    </select><br><br>

    <label for="wasteAmount">How much waste did you divert (lbs)?</label>
    <input type="number" id="wasteAmount" name="wasteAmount" min="0" step="0.1"><br><br>

    <button type="submit">Submit</button>
</form>
</body>
</html>
